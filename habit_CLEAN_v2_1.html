<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Habit Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#F2F3F7;-webkit-font-smoothing:antialiased;}
#app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:80px;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 10px;background:#F2F3F7;}
.topbar-title{font-size:22px;font-weight:700;color:#1C1C1E;}
.btn-ghost{background:none;border:none;cursor:pointer;font-size:13px;color:#999;padding:6px 10px;border-radius:10px;border:1px solid #E0E0E0;background:#fff;}

.month-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:0 18px 16px;}
.mnav{width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid #E8E8E8;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;}
.mnav:hover{background:#F0F0F0;}
.mlabel{font-size:16px;font-weight:600;color:#1C1C1E;min-width:150px;text-align:center;}

.hlist{display:flex;flex-direction:column;gap:14px;padding:0 14px;}

/* CARD */
.hcard{border-radius:20px;padding:16px 16px 14px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06);}

/* TOP ROW */
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.card-left{}
.hname{font-size:17px;font-weight:700;margin-bottom:4px;}
.hcount-row{display:flex;align-items:baseline;gap:5px;}
.hcount-num{font-size:30px;font-weight:700;line-height:1;}
.hcount-lbl{font-size:13px;opacity:.6;}
.streak-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;margin-top:5px;}

/* MONTHLY GRID */
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;width:130px;flex-shrink:0;}
.dsq{width:100%;aspect-ratio:1;border-radius:3px;cursor:pointer;transition:transform .12s;}
.dsq:active{transform:scale(.68);}

/* DIVIDER */
.card-divider{border:none;border-top:1px solid #F0F0F0;margin:12px 0 10px;}

/* YEAR SPARKLINE */
.year-section{}
.year-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#BBB;margin-bottom:7px;}
.sparkline{display:flex;align-items:flex-end;gap:3px;height:56px;}
.sp-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.sp-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:opacity .15s;}
.sp-bar:hover{opacity:.75;}
.sp-lbl{font-size:8px;color:#CCC;margin-top:1px;white-space:nowrap;}
.sp-cur{font-size:8px;font-weight:700;margin-top:1px;}

/* ADD MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal-sheet{background:#fff;border-radius:22px 22px 0 0;padding:22px 20px 44px;width:100%;max-width:520px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.modal-bg.open .modal-sheet{transform:translateY(0);}
input[type=text]{width:100%;padding:13px 14px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:15px;outline:none;font-family:inherit;color:#1C1C1E;background:#FAFAFA;}
input[type=text]:focus{border-color:#2B9FE0;background:#fff;}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s;}
.swatch.sel{border-color:#1C1C1E;transform:scale(1.15);}

.fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:54px;height:54px;border-radius:50%;background:#2B9FE0;color:#fff;border:none;cursor:pointer;font-size:30px;line-height:1;box-shadow:0 4px 18px rgba(43,159,224,.45);z-index:50;}
.hcard.drag-over{border:2px dashed #2B9FE0!important;background:#EEF7FF;}
.hcard.dragging{opacity:.4;transform:scale(.98);}
.drag-handle{cursor:grab;color:#CCC;font-size:18px;padding:4px 8px 4px 0;user-select:none;touch-action:none;line-height:1;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div></div>
    <div style="display:flex;gap:6px;">
      <button class="btn-ghost" onclick="doImport()">📥</button>
      <button class="btn-ghost" onclick="doExport()">💾</button>
      <button class="btn-ghost" onclick="doExportHTML()" title="Exporter en HTML">📄</button>
      <button class="btn-ghost" onclick="doEdit()">Edit</button>
    </div>
  </div>
  <div class="month-nav">
    <button class="mnav" onclick="prevM()">
      <svg width="9" height="14" viewBox="0 0 9 14" fill="none"><path d="M7 1L2 7l5 6" stroke="#999" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="mlabel" id="mlbl"></span>
    <button class="mnav" id="nbtn" onclick="nextM()">
      <svg width="9" height="14" viewBox="0 0 9 14" fill="none"><path d="M2 1l5 6-5 6" stroke="#999" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div id="pie-wrap" style="padding:0 14px 16px;"></div>
  <div id="hlist" class="hlist"></div>
  <div id="hempty" style="display:none;text-align:center;padding:60px 20px;color:#CCC;font-size:14px;">Appuie sur + pour ajouter une habitude.</div>
</div>

<button class="fab" onclick="openAdd()">+</button>

<div class="modal-bg" id="modal-bg" onclick="modalBgClick(event)">
  <div class="modal-sheet">
    <p style="font-size:17px;font-weight:700;margin-bottom:16px;color:#1C1C1E;">Nouvelle habitude</p>
    <input type="text" id="new-name" placeholder="Ex: Méditer, Lire, Nager…" maxlength="40" style="margin-bottom:16px;">
    <p style="font-size:11px;color:#BBB;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:9px;">Couleur</p>
    <div id="swatches" style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:20px;"></div>
    <div style="display:flex;gap:10px;">
      <button onclick="closeAdd()" style="flex:1;padding:14px;border:1.5px solid #E8E8E8;border-radius:13px;background:none;font-size:14px;cursor:pointer;color:#666;font-family:inherit;">Annuler</button>
      <button onclick="commitAdd()" style="flex:1;padding:14px;border:none;border-radius:13px;background:#2B9FE0;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Ajouter</button>
    </div>
  </div>
</div>

function load(){
  try{H=JSON.parse(localStorage.getItem('hbt5_h')||'null');}catch(e){H=null;}
  try{C=JSON.parse(localStorage.getItem('hbt5_c')||'null');}catch(e){C=null;}
  try{N=JSON.parse(localStorage.getItem('hbt5_n')||'null')||{};}catch(e){N={};}
  if(!H){H=DEFAULT_H;C=DEFAULT_C;sv();}
  if(!C){C=DEFAULT_C;sv();}
  // Réinjecte les flags depuis DEFAULT_H
  H=H.map(h=>{
    const def=DEFAULT_H.find(d=>d.id===h.id);
    if(!def) return h;
    const patch={};
    if(def.sport===false) patch.sport=false;
    if(def.hasNotes) patch.hasNotes=true;
    return Object.assign({},h,patch);
  });
  // Ajoute Social Skill si absent
  if(!H.find(h=>h.id==='h_social')) H.push(DEFAULT_H.find(h=>h.id==='h_social'));
}
function sv(){localStorage.setItem('hbt5_h',JSON.stringify(H));localStorage.setItem('hbt5_c',JSON.stringify(C));localStorage.setItem('hbt5_n',JSON.stringify(N));}

function cm(id,y,m){let n=0;for(let d=1;d<=dim(y,m);d++)if(gd(y,m,d,id))n++;return n;}
function pc(h){return PAL.find(p=>p.n===h.color)||PAL[0];}
function streak(id){
  let s=0,d=new Date(tY,tM,tD);
  for(let i=0;i<365;i++){
    const key=ds(d.getFullYear(),d.getMonth(),d.getDate());
    if(C[ck(key,id)]){s++;d.setDate(d.getDate()-1);}else break;
  }
  return s;
}
function tog(y,m,d,id){
  const k=ck(ds(y,m,d),id);C[k]?delete C[k]:(C[k]=1);sv();rl();
}
function last12(){
  const a=[];for(let i=11;i>=0;i--){let m=tM-i,y=tY;while(m<0){m+=12;y--;}a.push({y,m});}return a;
}

function buildPieSVG(data,total,size,showLabels){

  const cx=size/2,cy=size/2,R=size*0.39,holeR=size*0.225;
  let angle=-Math.PI/2,slices='',labels='';
  data.forEach(({c,cnt})=>{
    const slice=2*Math.PI*(cnt/total);
    const mid=angle+slice/2;
    const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    angle+=slice;
    const x2=cx+R*Math.cos(angle),y2=cy+R*Math.sin(angle);
    const xi1=cx+holeR*Math.cos(angle-slice),yi1=cy+holeR*Math.sin(angle-slice);
    const xi2=cx+holeR*Math.cos(angle),yi2=cy+holeR*Math.sin(angle);
    const large=slice>Math.PI?1:0;
    const path=`M${xi1.toFixed(1)},${yi1.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${holeR},${holeR} 0 ${large},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z`;
    slices+=`<path d="${path}" fill="${c.f}" opacity="0.9"/>`;
    if(showLabels&&cnt/total>0.1){
      const lx=cx+(R+holeR)/2*Math.cos(mid),ly=cy+(R+holeR)/2*Math.sin(mid);
      labels+=`<text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" text-anchor="middle" font-size="${size*0.065}" font-weight="700" fill="#fff" font-family="-apple-system,sans-serif">${Math.round(cnt/total*100)}%</text>`;
    }
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${slices}${labels}</svg>`;
}

function renderPie(){

  const total=data.reduce((s,d)=>s+d.cnt,0);

  // Year grid (12 months of cY)
  const monthTotals=Array.from({length:12},(_,m)=>sportH.reduce((s,h)=>s+cm(h.id,cY,m),0));
  const maxT=Math.max(...monthTotals,1);

    for(let day=1;day<=D;day++){
      const f=gd(cY,cM,day,h.id),fut=(ic&&day>tD)||(cY===tY&&cM>tM)||(cY>tY),isT=ic&&day===tD;

      const lbl=isT?`<span style="font-size:8px;font-weight:700;line-height:1;color:${f?'#fff':c.f};">${day}</span>`:'';

    const allYears=(()=>{

    const m12=last12();

    const avg=counts.filter(v=>v>0).reduce((a,b)=>a+b,0)/Math.max(counts.filter(v=>v>0).length,1);

      +m12.map(({y,m},i)=>{

        <span class="${isCur?'sp-cur':'sp-lbl'}" style="${isCur?'color:'+c.f+';':''}">${MS[m]}</span>
      </div>`;
      }).join('')
      +`<div style="position:absolute;bottom:${avgPx+13}px;left:0;right:0;border-top:1.5px dashed ${c.f}88;pointer-events:none;"></div>`
      +'</div>';

    const streakBadge=st>=2?`<div class="streak-badge" style="background:${c.light};color:${c.f};">🔥 ${st} jours</div>`:'';

    return `<div class="hcard" data-id="${h.id}" style="border-top:3px solid ${c.f};">
      <div class="card-top">
        <div class="drag-handle" title="Maintenir pour déplacer">⠿</div>
        <div class="card-left">

      </div>
      <hr class="card-divider">
      <div class="year-section">
        <p class="year-label">12 derniers mois</p>
        ${spark}
          ${yearlyComp}

  }).join('');
  initDrag();
}

// ── Drag & drop ──────────────────────────────────────────────────
let dragSrcId=null;

function initDrag(){
  const list=document.getElementById('hlist');
  const cards=[...list.querySelectorAll('.hcard')];

  cards.forEach(card=>{
    const handle=card.querySelector('.drag-handle');

    // ── Mouse drag ──
    handle.addEventListener('mousedown',e=>{
      card.setAttribute('draggable','true');
    });
    card.addEventListener('dragstart',e=>{
      dragSrcId=card.dataset.id;
      setTimeout(()=>card.classList.add('dragging'),0);
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      card.removeAttribute('draggable');
      list.querySelectorAll('.hcard').forEach(c=>c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover',e=>{
      e.preventDefault();
      list.querySelectorAll('.hcard').forEach(c=>c.classList.remove('drag-over'));
      if(card.dataset.id!==dragSrcId) card.classList.add('drag-over');
    });
    card.addEventListener('drop',e=>{
      e.preventDefault();
      card.classList.remove('drag-over');
      if(!dragSrcId||dragSrcId===card.dataset.id) return;
      const fromIdx=H.findIndex(h=>h.id===dragSrcId);
      const toIdx=H.findIndex(h=>h.id===card.dataset.id);
      if(fromIdx<0||toIdx<0) return;
      const [moved]=H.splice(fromIdx,1);
      H.splice(toIdx,0,moved);
      sv(); rl();
    });

    // ── Touch drag (long press) ──
    let pressTimer=null, touchClone=null, active=false;

    handle.addEventListener('touchstart',e=>{
      const touch=e.touches[0];
      pressTimer=setTimeout(()=>{
        active=true;
        dragSrcId=card.dataset.id;
        card.classList.add('dragging');
        // clone flottant
        touchClone=card.cloneNode(true);
        touchClone.style.cssText=`position:fixed;width:${card.offsetWidth}px;opacity:.85;pointer-events:none;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.18);border-radius:20px;top:${card.getBoundingClientRect().top}px;left:${card.getBoundingClientRect().left}px;transition:none;`;
        document.body.appendChild(touchClone);
        if(navigator.vibrate) navigator.vibrate(40);
      },400);
    },{passive:true});

    handle.addEventListener('touchmove',e=>{
      clearTimeout(pressTimer);
      if(!active) return;
      e.preventDefault();
      const touch=e.touches[0];
      touchClone.style.top=(touch.clientY-40)+'px';
      touchClone.style.left=(touch.clientX-card.offsetWidth/2)+'px';
      // trouver la cible
      touchClone.style.display='none';
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      touchClone.style.display='';
      const target=el&&el.closest('.hcard');
      list.querySelectorAll('.hcard').forEach(c=>c.classList.remove('drag-over'));
      if(target&&target.dataset.id!==dragSrcId) target.classList.add('drag-over');
    },{passive:false});

    const endTouch=e=>{
      clearTimeout(pressTimer);
      if(!active){active=false;return;}
      active=false;
      if(touchClone){touchClone.remove();touchClone=null;}
      card.classList.remove('dragging');
      const over=list.querySelector('.hcard.drag-over');
      list.querySelectorAll('.hcard').forEach(c=>c.classList.remove('drag-over'));
      if(over&&dragSrcId&&over.dataset.id!==dragSrcId){
        const fromIdx=H.findIndex(h=>h.id===dragSrcId);
        const toIdx=H.findIndex(h=>h.id===over.dataset.id);
        if(fromIdx>=0&&toIdx>=0){
          const [moved]=H.splice(fromIdx,1);
          H.splice(toIdx,0,moved);
          sv(); rl();
        }
      }
      dragSrcId=null;
    };
    handle.addEventListener('touchend',endTouch,{passive:true});
    handle.addEventListener('touchcancel',endTouch,{passive:true});
  });
}

  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;';
  ov.innerHTML=`<div style="background:#fff;border-radius:16px;padding:20px;width:100%;max-width:440px;display:flex;flex-direction:column;gap:12px;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <p style="font-size:15px;font-weight:600;color:#1C1C1E;">💾 Sauvegarde</p>
      <button onclick="document.getElementById('exp-modal').remove()" style="background:none;border:none;cursor:pointer;font-size:22px;color:#999;">×</button>
    </div>
    <p style="font-size:13px;color:#888;">Copie et envoie ce texte à Claude pour restaurer.</p>
    <textarea id="exp-ta" readonly style="height:180px;padding:10px;border:1px solid #E0E0E0;border-radius:10px;font-size:10px;font-family:monospace;resize:none;outline:none;color:#555;background:#F8F8F8;">${json}</textarea>
    <button onclick="navigator.clipboard.writeText(document.getElementById('exp-ta').value).then(()=>{this.textContent='✓ Copié !';this.style.background='#34C759';}).catch(()=>{document.getElementById('exp-ta').select();document.execCommand('copy');this.textContent='✓ Copié !';this.style.background='#34C759';})" style="padding:13px;border:none;border-radius:12px;background:#2B9FE0;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">📋 Copier le JSON</button>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
}

function doEdit(){
  if(!H.length)return;
  const idx=prompt(H.map((h,i)=>`${i+1}. ${h.name}`).join('\n')+'\n\nNuméro à supprimer :');
  const n=parseInt(idx);
  if(n>=1&&n<=H.length&&confirm(`Supprimer "${H[n-1].name}" ?`)){H.splice(n-1,1);sv();rl();}
}
function prevM(){if(cM===0){cM=11;cY--;}else cM--;rl();}
function nextM(){const nM=tM===11?0:tM+1,nY=tM===11?tY+1:tY;if(cY===nY&&cM===nM)return;if(cM===11){cM=0;cY++;}else cM++;rl();}

document.getElementById('new-name').addEventListener('keydown',e=>{if(e.key==='Enter')commitAdd();if(e.key==='Escape')closeAdd();});
load();cY=tY;cM=tM;rl();
</script>
